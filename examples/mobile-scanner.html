<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Studio UX — Exemplo Mobile: Scanner</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../packages/tokens/tokens.css">
  <link rel="stylesheet" href="../packages/mobile/mobile.css">
  <style>
    body { margin: 0; background: #000; font-family: var(--su-font-ui); } /* su-allow: color-off-token (fundo de cena — viewport escuro da câmera, cor física não-token) */
    .phone { max-width: 390px; margin: 0 auto; min-height: 100vh; background: #0A0C10; display: flex; flex-direction: column; } /* su-allow: color-off-token (cena escura do scanner) */
    .bar { display: flex; align-items: center; gap: var(--su-space-3); padding: var(--su-space-3) var(--su-space-4); color: var(--su-text-on-action); }
    .bar__title { font-size: var(--su-fs-h3); font-weight: 600; flex: 1; }
    .icon-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,.12); border: none; color: var(--su-text-on-action); display: flex; align-items: center; justify-content: center; font-size: var(--su-fs-h2); }
  </style>
</head>
<body>
  <div class="phone">
    <div class="bar">
      <button class="icon-btn" aria-label="Fechar"><i class="ti ti-x"></i></button>
      <span class="bar__title">Escanear código</span>
      <button class="icon-btn" aria-label="Lanterna"><i class="ti ti-bolt"></i></button>
    </div>

    <div class="su-m-scanner" style="flex:1;">
      <div class="su-m-scanner__frame">
        <span class="su-m-scanner__corner su-m-scanner__corner--tl"></span>
        <span class="su-m-scanner__corner su-m-scanner__corner--tr"></span>
        <span class="su-m-scanner__corner su-m-scanner__corner--bl"></span>
        <span class="su-m-scanner__corner su-m-scanner__corner--br"></span>
      </div>
      <div class="su-m-scanner__hint">Aponte a câmera para o código do boleto</div>
    </div>

    <!-- Alternativa acessível ao gesto/câmera (P19): sempre há um caminho manual. -->
    <!-- su-allow: color-off-token (cena escura do scanner) -->
    <div class="su-m-footer" style="background:#0A0C10;border-top:1px solid rgba(255,255,255,.12);">
      <button class="su-m-cta su-m-cta--ghost" style="color:var(--su-text-on-action);border-color:rgba(255,255,255,.3);"><i class="ti ti-keyboard"></i>Digitar código manualmente</button>
    </div>
  </div>
</body>
</html>
