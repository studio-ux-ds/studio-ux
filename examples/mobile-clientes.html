<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Studio UX — Exemplo Mobile: Clientes</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../packages/tokens/tokens.css">
  <link rel="stylesheet" href="../packages/mobile/mobile.css">
  <style>
    body { margin: 0; background: var(--su-surface-sunken); font-family: var(--su-font-ui); }
    /* Moldura de telefone só para visualizar no desktop; num aparelho real é a tela cheia. */
    .phone { max-width: 390px; margin: 0 auto; min-height: 100vh; background: var(--su-surface-base); display: flex; flex-direction: column; position: relative; }
    .app { flex: 1; overflow: auto; padding-bottom: var(--su-space-2); }
    .status-badge { font-size: var(--su-fs-caption); padding: var(--su-space-1) var(--su-space-2); border-radius: var(--su-radius-full); }
    .hidden { display: none !important; }
    .scrim { position: fixed; inset: 0; background: rgba(20,22,30,.45); z-index: 900; max-width: 390px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="phone su-m">
    <div class="app">
      <div class="su-m-topbar">
        <span class="su-m-topbar__title">Clientes</span>
        <button class="su-m-navitem" style="min-height:auto;" onclick="toggleTheme()"><i class="ti ti-moon" style="font-size:var(--su-fs-h2);"></i></button>
        <button class="su-m-navitem" style="min-height:auto;color:var(--su-action);" onclick="openSheet()"><i class="ti ti-adjustments-horizontal" style="font-size:var(--su-fs-h1);"></i></button>
      </div>

      <div class="su-m-search"><i class="ti ti-search"></i>Buscar cliente</div>

      <div class="su-m-list" id="list"></div>
    </div>

    <nav class="su-m-bottomnav">
      <button class="su-m-navitem"><i class="ti ti-home"></i>Início</button>
      <button class="su-m-navitem su-m-navitem--active"><i class="ti ti-users"></i>Clientes</button>
      <button class="su-m-fab" aria-label="Novo cliente"><i class="ti ti-plus"></i></button>
      <button class="su-m-navitem"><i class="ti ti-file-invoice"></i>Faturas</button>
      <button class="su-m-navitem"><i class="ti ti-user"></i>Perfil</button>
    </nav>

    <div class="scrim hidden" id="scrim" onclick="if(event.target===this)closeSheet()">
      <div class="su-m-sheet">
        <div class="su-m-sheet__handle"></div>
        <div style="display:flex;align-items:center;margin-bottom:var(--su-space-3);"><span style="flex:1;font-size:var(--su-fs-body);font-weight:600;">Filtros</span><span style="font-size:var(--su-fs-body-sm);color:var(--su-action);">Limpar</span></div>
        <div style="font-size:var(--su-fs-caption);color:var(--su-text-secondary);margin-bottom:var(--su-space-2);">Status</div>
        <div class="su-m-chips" style="margin-bottom:var(--su-space-4);">
          <button class="su-m-chip su-m-chip--active">Todos</button>
          <button class="su-m-chip">Ativos</button>
          <button class="su-m-chip">Pendentes</button>
          <button class="su-m-chip">Inadimplentes</button>
        </div>
        <button class="su-m-chip su-m-chip--active" style="width:100%;border-radius:var(--su-radius-lg);font-size:var(--su-fs-body-sm);min-height:48px;" onclick="closeSheet()">Aplicar filtros</button>
      </div>
    </div>
  </div>

  <script>
    var bg = { Ativo:['var(--su-success-bg)','var(--su-success-fg)'], Pendente:['var(--su-warning-bg)','var(--su-warning-fg)'], Inadimplente:['var(--su-danger-bg)','var(--su-danger-fg)'] };
    var data = [["Marina Alves","Vitalício","Ativo","R$ 3.240","MA"],["Carlos Nogueira","Mensal","Pendente","R$ 1.980","CN"],["Bianca Ferraz","Vitalício","Inadimplente","R$ 610","BF"],["Diego Prado","Vitalício","Ativo","R$ 5.120","DP"],["Helena Costa","Mensal","Ativo","R$ 2.700","HC"]];
    var list = document.getElementById('list');
    var shortStatus = { Ativo:'Ativo', Pendente:'Pendente', Inadimplente:'Inadimpl.' };
    data.forEach(function(d){
      var el = document.createElement('div'); el.className = 'su-m-item';
      el.innerHTML = '<span class="su-m-item__avatar">'+d[4]+'</span>'+
        '<span class="su-m-item__body"><span class="su-m-item__title">'+d[0]+'</span><span class="su-m-item__sub">'+d[1]+'</span></span>'+
        '<span class="su-m-item__end"><span class="su-m-item__value">'+d[3]+'</span>'+
          '<span class="status-badge" style="background:'+bg[d[2]][0]+';color:'+bg[d[2]][1]+';">'+shortStatus[d[2]]+'</span></span>';
      list.appendChild(el);
    });
    function openSheet(){ document.getElementById('scrim').classList.remove('hidden'); }
    function closeSheet(){ document.getElementById('scrim').classList.add('hidden'); }
    function toggleTheme(){ var h=document.documentElement; h.dataset.theme = h.dataset.theme==='dark'?'light':'dark'; }
  </script>
</body>
</html>
