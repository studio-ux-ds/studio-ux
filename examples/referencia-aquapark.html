<!doctype html>
<html lang="pt-BR" data-theme="light"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Studio UX — Referência: AquaPark</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
:root{
  --su-surface-base:#F7F8FA;--su-surface-raised:#FFFFFF;--su-surface-sunken:#EDEFF3;
  --su-text-primary:#171A1F;--su-text-secondary:#545B67;--su-text-muted:#8E95A1;--su-text-on-action:#FFFFFF;
  --su-border-subtle:#EDEFF3;--su-border-default:#DDE1E8;--su-border-strong:#C4CAD4;
  --su-success-fg:#047857;--su-success-bg:#E6F4EE;--su-warning-fg:#B25209;--su-warning-bg:#FBF0DD;
  --su-danger-fg:#D12424;--su-danger-bg:#FCE9E9;--su-info-fg:#2563EB;--su-info-bg:#E8F0FE;
  --su-font-ui:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;--su-fw-medium:500;--su-fw-semibold:600;--su-fw-bold:700;
  --su-fs-h3:16px;--su-fs-body:15px;--su-fs-body-sm:13px;--su-fs-caption:12px;
  --su-space-1:4px;--su-space-2:8px;--su-space-3:12px;--su-space-4:16px;--su-space-5:20px;--su-space-6:24px;--su-space-8:32px;
  --su-radius-sm:6px;--su-radius-md:8px;--su-radius-lg:12px;--su-radius-full:9999px;
  --su-elevation-raised:0 1px 2px rgba(23,26,31,.06),0 1px 3px rgba(23,26,31,.04);
  --su-elevation-overlay:0 8px 24px rgba(23,26,31,.10);
  --su-duration-fast:120ms;--su-ease:cubic-bezier(0.2,0,0,1);
  --su-action:#EA580C;--su-action-hover:#C2470A;--su-action-tint:#FEEDE3;
  --chart-1:#EA580C;--chart-2:#0D9488;--chart-3:#2563EB;--chart-4:#B25209;
}
[data-theme="dark"]{
  --su-surface-base:#14161B;--su-surface-raised:#1C1F26;--su-surface-sunken:#101216;
  --su-text-primary:#F2F4F7;--su-text-secondary:#A6ADBA;--su-text-muted:#6E7683;
  --su-border-subtle:#23262E;--su-border-default:#2A2E37;--su-border-strong:#3A3F49;
  --su-success-fg:#34D399;--su-success-bg:#123028;--su-warning-fg:#E0A82E;--su-warning-bg:#3A2A12;--su-danger-fg:#F87171;--su-danger-bg:#3A1A1A;--su-info-fg:#60A5FA;--su-info-bg:#16233F;
  --su-action:#F97316;--su-action-hover:#FB8A3C;--su-action-tint:#3A2113;
  --su-elevation-raised:0 1px 2px rgba(0,0,0,.30);--su-elevation-overlay:0 10px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--su-font-ui);background:var(--su-surface-base);color:var(--su-text-primary);-webkit-font-smoothing:antialiased;font-size:14px;}
svg{flex:none;}button{font-family:inherit;}
.su-btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--su-space-2);font-size:14px;font-weight:var(--su-fw-medium);line-height:1;height:36px;padding:0 var(--su-space-4);border-radius:var(--su-radius-md);border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:background var(--su-duration-fast);}
.su-btn--primary{background:var(--su-action);color:#fff;}.su-btn--primary:hover{background:var(--su-action-hover);}
.su-btn--secondary{background:var(--su-surface-raised);color:var(--su-text-primary);border-color:var(--su-border-default);}.su-btn--secondary:hover{background:var(--su-surface-sunken);}
.su-btn--sm{height:32px;font-size:13px;padding:0 var(--su-space-3);}
.su-iconbtn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--su-radius-md);background:transparent;border:none;color:var(--su-text-secondary);cursor:pointer;position:relative;}
.su-iconbtn:hover{background:var(--su-surface-sunken);color:var(--su-text-primary);}
.su-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:var(--su-fw-semibold);line-height:1;padding:4px 9px;border-radius:var(--su-radius-full);background:var(--su-surface-sunken);color:var(--su-text-secondary);white-space:nowrap;}
.su-badge.success{background:var(--su-success-bg);color:var(--su-success-fg);}.su-badge.warning{background:var(--su-warning-bg);color:var(--su-warning-fg);}
.su-badge.danger{background:var(--su-danger-bg);color:var(--su-danger-fg);}.su-badge.info{background:var(--su-info-bg);color:var(--su-info-fg);}.su-badge.brand{background:var(--su-action-tint);color:var(--su-action);}
.su-table{width:100%;border-collapse:collapse;font-size:13px;}
.su-table thead th{text-align:left;font-weight:var(--su-fw-medium);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--su-text-muted);padding:var(--su-space-3) var(--su-space-5);white-space:nowrap;}
.su-table td{padding:var(--su-space-3) var(--su-space-5);border-top:1px solid var(--su-border-subtle);}
.su-table td.num,.su-table th.num{text-align:right;font-variant-numeric:tabular-nums;}
.su-table tbody tr:hover td{background:var(--su-surface-sunken);}

.shell{display:flex;min-height:100vh;}
.side{width:256px;flex:none;background:var(--su-surface-raised);border-right:1px solid var(--su-border-default);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.side__brand{display:flex;align-items:center;gap:var(--su-space-3);padding:var(--su-space-4) var(--su-space-5);border-bottom:1px solid var(--su-border-subtle);}
.side__logo{width:32px;height:32px;border-radius:var(--su-radius-md);background:var(--su-action);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:var(--su-fw-bold);flex:none;}
.side__name{font-weight:var(--su-fw-bold);font-size:15px;line-height:1.1;}.side__sub{font-size:10px;letter-spacing:.14em;color:var(--su-text-muted);font-weight:var(--su-fw-semibold);}
.nav{flex:1;overflow-y:auto;padding:var(--su-space-3) var(--su-space-2) var(--su-space-4);}
.nav__item{display:flex;align-items:center;gap:var(--su-space-3);padding:8px var(--su-space-3);border-radius:var(--su-radius-md);font-size:13px;font-weight:var(--su-fw-medium);color:var(--su-text-secondary);cursor:pointer;margin-bottom:1px;border:none;background:transparent;width:100%;text-align:left;transition:background var(--su-duration-fast),color var(--su-duration-fast);}
.nav__item:hover{background:var(--su-surface-sunken);color:var(--su-text-primary);}
.nav__item.active{background:var(--su-action-tint);color:var(--su-action);font-weight:var(--su-fw-semibold);}
.nav__item .lbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav__chev{transition:transform var(--su-duration-fast) var(--su-ease);color:var(--su-text-muted);}.nav__chev.open{transform:rotate(90deg);}
.nav__children{margin-left:26px;border-left:1px solid var(--su-border-subtle);padding-left:var(--su-space-2);display:none;flex-direction:column;margin-top:1px;margin-bottom:var(--su-space-1);}
.nav__children.open{display:flex;}.nav__children .nav__item{padding:7px var(--su-space-3);}
.side__foot{border-top:1px solid var(--su-border-subtle);padding:var(--su-space-3) var(--su-space-4);display:flex;align-items:center;gap:var(--su-space-3);}
.avatar{border-radius:var(--su-radius-full);background:var(--su-action-tint);color:var(--su-action);display:flex;align-items:center;justify-content:center;font-weight:var(--su-fw-semibold);flex:none;}
.side__foot .avatar{width:34px;height:34px;font-size:12px;}.side__foot .id{flex:1;min-width:0;}
.side__foot .id b{display:block;font-size:13px;font-weight:var(--su-fw-semibold);}.side__foot .id span{font-size:11px;color:var(--su-text-muted);}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;gap:var(--su-space-3);height:60px;padding:0 var(--su-space-6);border-bottom:1px solid var(--su-border-default);background:var(--su-surface-raised);position:sticky;top:0;z-index:10;}
.crumbwrap{flex:1;min-width:0;}.crumb{font-size:12px;color:var(--su-text-muted);}.crumb b{color:var(--su-text-primary);font-weight:var(--su-fw-medium);}
.crumb-sep{color:var(--su-text-muted);margin:0 3px;}
.su-btn svg{width:15px;height:15px;flex:none;}
.su-btn--sm svg{width:14px;height:14px;}
.search{width:280px;display:flex;align-items:center;gap:var(--su-space-2);height:38px;padding:0 var(--su-space-3);border:1px solid var(--su-border-default);border-radius:var(--su-radius-md);color:var(--su-text-muted);font-size:13px;background:var(--su-surface-base);cursor:pointer;}
.search .kbd{margin-left:auto;font-size:11px;color:var(--su-text-muted);border:1px solid var(--su-border-default);border-radius:var(--su-radius-sm);padding:1px 6px;background:var(--su-surface-raised);}
.dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--su-danger-fg);border:2px solid var(--su-surface-raised);}
.content{padding:var(--su-space-8);}
.screen{display:none;}.screen.active{display:block;}
.h1{font-size:26px;font-weight:var(--su-fw-bold);letter-spacing:-.02em;margin:0 0 var(--su-space-1);}
.sub{color:var(--su-text-secondary);font-size:var(--su-fs-body);margin:0 0 var(--su-space-8);}
.row-between{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--su-space-4);margin-bottom:var(--su-space-6);}
.card{background:var(--su-surface-raised);border:1px solid var(--su-border-default);border-radius:var(--su-radius-lg);box-shadow:var(--su-elevation-raised);}
.card__pad{padding:var(--su-space-6);}.card__title{font-size:var(--su-fs-h3);font-weight:var(--su-fw-semibold);margin:0;}.card__desc{font-size:var(--su-fs-body-sm);color:var(--su-text-muted);margin:2px 0 0;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--su-space-4);margin-bottom:var(--su-space-6);}
.kpi{background:var(--su-surface-raised);border:1px solid var(--su-border-default);border-radius:var(--su-radius-lg);box-shadow:var(--su-elevation-raised);padding:var(--su-space-5);}
.kpi__top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:var(--su-space-3);}.kpi__label{font-size:var(--su-fs-body-sm);color:var(--su-text-secondary);}
.kpi__ic{width:36px;height:36px;border-radius:var(--su-radius-md);display:flex;align-items:center;justify-content:center;}
.kpi__val{font-size:28px;font-weight:var(--su-fw-bold);letter-spacing:-.02em;line-height:1;}
.kpi__delta{font-size:var(--su-fs-caption);margin-top:var(--su-space-3);font-weight:var(--su-fw-medium);}.up{color:var(--su-success-fg);}.down{color:var(--su-danger-fg);}
.grid2{display:grid;grid-template-columns:1.8fr 1fr;gap:var(--su-space-6);align-items:start;}
.gridline{stroke:var(--su-border-subtle);stroke-width:1;}.axis{font-size:11px;fill:var(--su-text-muted);}
.hbar{display:flex;align-items:center;gap:var(--su-space-3);margin-bottom:var(--su-space-4);}.hbar__lbl{width:120px;font-size:var(--su-fs-body-sm);color:var(--su-text-secondary);}
.hbar__track{flex:1;height:10px;border-radius:var(--su-radius-full);background:var(--su-surface-sunken);overflow:hidden;}.hbar__fill{height:100%;border-radius:var(--su-radius-full);}
.hbar__val{width:80px;text-align:right;font-size:var(--su-fs-body-sm);color:var(--su-text-muted);font-variant-numeric:tabular-nums;}
.seg{display:inline-flex;background:var(--su-surface-sunken);border-radius:var(--su-radius-md);padding:3px;}
.seg button{border:none;background:transparent;font-size:13px;font-weight:var(--su-fw-medium);color:var(--su-text-secondary);padding:5px 12px;border-radius:var(--su-radius-sm);cursor:pointer;}
.seg button.on{background:var(--su-surface-raised);color:var(--su-text-primary);box-shadow:var(--su-elevation-raised);}
.meter{margin-bottom:var(--su-space-4);}.meter__top{display:flex;justify-content:space-between;font-size:var(--su-fs-caption);margin-bottom:6px;}
.meter__top b{font-weight:var(--su-fw-medium);color:var(--su-text-secondary);}.meter__top span{color:var(--su-text-muted);}
.meter__track{height:8px;border-radius:var(--su-radius-full);background:var(--su-surface-sunken);overflow:hidden;}.meter__fill{height:100%;border-radius:var(--su-radius-full);background:var(--su-action);}
/* ---- lista rica ---- */
.ltabs{display:inline-flex;gap:4px;background:var(--su-surface-sunken);border-radius:var(--su-radius-md);padding:3px;margin-bottom:var(--su-space-4);}
.ltab{border:none;background:transparent;font-size:13px;font-weight:var(--su-fw-medium);color:var(--su-text-secondary);padding:6px 14px;border-radius:var(--su-radius-sm);cursor:pointer;}
.ltab.on{background:var(--su-surface-raised);color:var(--su-text-primary);box-shadow:var(--su-elevation-raised);}
.ltoolbar{display:flex;align-items:center;gap:var(--su-space-3);}
.lsearch{flex:1;max-width:340px;display:flex;align-items:center;gap:var(--su-space-2);height:38px;padding:0 var(--su-space-3);border:1px solid var(--su-border-default);border-radius:var(--su-radius-md);color:var(--su-text-muted);background:var(--su-surface-raised);}
.lsearch input{border:none;outline:none;background:transparent;font-family:inherit;font-size:13px;color:var(--su-text-primary);flex:1;}
.lsort{display:inline-flex;align-items:center;gap:5px;cursor:pointer;}.lsort svg{opacity:.45;}
.tava{display:flex;align-items:center;gap:var(--su-space-3);}.tava .avatar{width:34px;height:34px;font-size:12px;}
.tava b{font-size:13px;font-weight:var(--su-fw-semibold);display:block;}.tava span{font-size:12px;color:var(--su-text-muted);}
.rowact{display:inline-flex;gap:2px;justify-content:flex-end;}
.pager2{display:flex;justify-content:space-between;align-items:center;padding:var(--su-space-3) var(--su-space-5);border-top:1px solid var(--su-border-subtle);}
.pg{font-size:var(--su-fs-caption);color:var(--su-text-muted);}
.pgnums{display:flex;align-items:center;gap:var(--su-space-2);}
.pgpick{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--su-text-secondary);}.pgpick .sel{border:1px solid var(--su-border-default);border-radius:var(--su-radius-sm);padding:3px 8px;background:var(--su-surface-raised);}
.tabs{display:flex;gap:var(--su-space-1);border-bottom:1px solid var(--su-border-default);margin-bottom:var(--su-space-6);}
.tab{-webkit-appearance:none;appearance:none;background:transparent;border:0;border-bottom:2px solid transparent;border-radius:0;box-shadow:none;font-family:inherit;line-height:1.4;padding:var(--su-space-3) var(--su-space-4);font-size:var(--su-fs-body-sm);font-weight:var(--su-fw-medium);color:var(--su-text-secondary);cursor:pointer;margin-bottom:-1px;transition:color var(--su-duration-fast,.15s) var(--su-ease,ease);}.tab:hover{color:var(--su-text-primary);}.tab.on{color:var(--su-action);border-bottom-color:var(--su-action);}
.ei-filter{display:flex;align-items:center;gap:var(--su-space-3);padding:var(--su-space-3) var(--su-space-4);flex-wrap:wrap;margin-bottom:var(--su-space-4);}
.ei-sel{max-width:260px;height:36px;}
.ei-count{margin-left:auto;font-size:var(--su-fs-caption);color:var(--su-text-muted);}
.ei-filter .su-btn svg{width:14px;height:14px;flex:none;}
.ei-table td{vertical-align:middle;}
.ei-rec{font-size:12px;color:var(--su-text-muted);white-space:nowrap;}
.ei-rem b{font-size:13px;font-weight:var(--su-fw-medium);color:var(--su-text-primary);display:block;}
.ei-rem span{font-size:11px;color:var(--su-text-muted);}
.ei-wa{font-variant-numeric:tabular-nums;white-space:nowrap;}
.ei-vend-none{font-size:13px;font-style:italic;color:var(--su-text-muted);}
.ei-st{display:flex;flex-direction:column;align-items:flex-start;gap:4px;}
.ei-act{display:inline-flex;gap:2px;justify-content:center;}
.ei-act .su-iconbtn{width:30px;height:30px;}
.ei-wa-btn svg{stroke:#10b981;}.ei-wa-btn:hover{background:rgba(16,185,129,.10);}
.ei-as-btn svg{stroke:#0ea5e9;}.ei-as-btn:hover{background:rgba(14,165,233,.10);}
.tp{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:var(--su-radius-full);font-size:10px;font-weight:var(--su-fw-semibold);line-height:1;}
.tp svg{width:11px;height:11px;}
.tp--HOT{color:#ef4444;background:rgba(239,68,68,.12);}
.tp--WARM{color:#f59e0b;background:rgba(245,158,11,.12);}
.tp--COLD{color:#3b82f6;background:rgba(59,130,246,.12);}
.sg-row{display:flex;align-items:center;gap:var(--su-space-3);padding:var(--su-space-3) var(--su-space-4);border-top:1px solid var(--su-border-subtle);}
.sg-row:first-child{border-top:none;}
.sg-av{width:36px;height:36px;flex:none;border-radius:var(--su-radius-full);background:var(--su-action-tint);color:var(--su-action);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:var(--su-fw-semibold);}
.sg-id{flex:1;min-width:0;}.sg-id b{font-size:13px;font-weight:var(--su-fw-medium);display:block;color:var(--su-text-primary);}.sg-id span{font-size:12px;color:var(--su-text-muted);}
.mg-sec{margin-top:var(--su-space-5);}
.mg-gtitle{font-size:11px;font-weight:var(--su-fw-semibold);letter-spacing:.06em;text-transform:uppercase;color:var(--su-text-muted);margin:0 0 var(--su-space-3);}
.mg-card{background:var(--su-surface-raised);border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-lg);padding:var(--su-space-4);margin-bottom:var(--su-space-3);}
.mg-card__top{display:flex;align-items:center;justify-content:space-between;gap:var(--su-space-3);margin-bottom:var(--su-space-2);}
.mg-ev{font-size:14px;font-weight:var(--su-fw-semibold);color:var(--su-text-primary);}
.mg-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:var(--su-space-2);}
.mg-ch{font-size:11px;font-weight:var(--su-fw-semibold);padding:2px 8px;border-radius:var(--su-radius-full);}
.mg-body{font-size:13px;color:var(--su-text-secondary);line-height:1.5;background:var(--su-surface-sunken);border-radius:var(--su-radius-md);padding:var(--su-space-3);}
.mg-test{display:flex;align-items:center;justify-content:space-between;gap:var(--su-space-4);flex-wrap:wrap;padding:var(--su-space-4);}
.mg-testctl{display:flex;gap:var(--su-space-2);align-items:center;}
.cv-code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;font-weight:var(--su-fw-semibold);color:var(--su-text-primary);}
.cv-grip{color:var(--su-text-muted);cursor:grab;}
.ev-err{font-size:12px;color:var(--su-text-muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tk-row{display:flex;align-items:center;gap:var(--su-space-3);padding:var(--su-space-3) 0;border-top:1px solid var(--su-border-subtle);}
.tk-id{flex:1;min-width:0;}.tk-id b{font-size:13px;font-weight:var(--su-fw-medium);display:block;color:var(--su-text-primary);}.tk-id span{font-size:11px;color:var(--su-text-muted);}
.tk-cron{height:34px;text-align:center;}
.dz-card{display:flex;align-items:center;justify-content:space-between;gap:var(--su-space-4);margin-bottom:var(--su-space-3);flex-wrap:wrap;}
.dz-rich{padding:var(--su-space-5);margin-bottom:var(--su-space-4);}
.dz-head{display:flex;gap:var(--su-space-3);align-items:flex-start;}
.dz-ic{width:40px;height:40px;flex:none;border-radius:var(--su-radius-md);display:flex;align-items:center;justify-content:center;}
.dz-ic svg{width:20px;height:20px;}
.dz-txt{min-width:0;}.dz-txt b{font-size:var(--su-fs-body);font-weight:var(--su-fw-semibold);color:var(--su-text-primary);}
.dz-txt .sub{max-width:760px;}
.dz-info{background:var(--su-surface-sunken);border-radius:var(--su-radius-md);padding:var(--su-space-3) var(--su-space-4);margin:var(--su-space-3) 0 0;}
.dz-info>b{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--su-text-muted);display:block;margin-bottom:var(--su-space-2);}
.dz-info ul{margin:0;padding-left:18px;display:flex;flex-direction:column;gap:3px;}
.dz-info li{font-size:12px;color:var(--su-text-secondary);}
.dz-foot{display:flex;gap:var(--su-space-2);flex-wrap:wrap;margin-top:var(--su-space-4);}
.dz-foot .su-btn svg{width:14px;height:14px;flex:none;}

.field-row{display:grid;grid-template-columns:240px 1fr;gap:var(--su-space-4);padding:var(--su-space-5) 0;border-bottom:1px solid var(--su-border-subtle);align-items:center;}

.chat__item .avatar{width:38px;height:38px;font-size:13px;}.chat__nm{font-size:var(--su-fs-body-sm);font-weight:var(--su-fw-semibold);}

/* command palette */

.su-btn--ghost{background:transparent;color:var(--su-text-primary);}.su-btn--ghost:hover{background:var(--su-surface-sunken);}

.box.on{background:var(--su-action);border-color:var(--su-action);}
.radio{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--su-border-strong);position:relative;display:inline-block;}
.radio.on{border-color:var(--su-action);}.radio.on::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--su-action);}
.sel2{height:38px;border:1px solid var(--su-border-default);border-radius:var(--su-radius-md);padding:0 var(--su-space-3);display:inline-flex;align-items:center;gap:8px;color:var(--su-text-secondary);background:var(--su-surface-raised);font-size:14px;min-width:200px;justify-content:space-between;}

.stepper{display:flex;align-items:flex-start;}

.step__bar{flex:1;height:2px;background:var(--su-border-default);margin:17px 8px 0;min-width:36px;}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:var(--su-space-2);font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--su-text-muted);margin-bottom:var(--su-space-2);}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:var(--su-space-2);}
.cal-cell{min-height:82px;border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-md);padding:6px;font-size:13px;color:var(--su-text-secondary);}

.ac-daylabel{display:inline-block;font-size:12px;font-weight:var(--su-fw-semibold);text-transform:uppercase;letter-spacing:.06em;color:var(--su-text-muted);background:var(--su-surface-sunken);border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-full);padding:var(--su-space-1) var(--su-space-3);margin:0 0 var(--su-space-4) calc(-1 * var(--su-space-6) + 4px)}

.ac-item::before{content:"";position:absolute;left:calc(-1 * var(--su-space-6) + 9px);top:20px;width:14px;height:14px;border-radius:var(--su-radius-full);background:var(--su-surface-base);border:2px solid var(--su-border-strong);z-index:1}
.ac-item.ac-pay::before{border-color:var(--su-success-fg)}
.ac-item.ac-sale::before{border-color:var(--su-action)}
.ac-item.ac-info::before{border-color:var(--su-info-fg)}
.ac-item.ac-warn::before{border-color:var(--su-warning-fg)}
.ac-body{flex:1;min-width:0}

.ac-target{color:var(--su-action);font-weight:var(--su-fw-medium)}
.ac-meta{margin-top:2px;font-size:12px;color:var(--su-text-muted)}
.ac-time{flex-shrink:0;font-size:12px;color:var(--su-text-muted);white-space:nowrap;padding-top:2px}
.ac-ic{width:32px;height:32px;border-radius:var(--su-radius-full);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ac-ic svg{width:16px;height:16px}
.ac-ic.ac-pay{background:var(--su-success-bg);color:var(--su-success-fg)}
.ac-ic.ac-sale{background:var(--su-action-tint);color:var(--su-action)}
.ac-ic.ac-info{background:var(--su-info-bg);color:var(--su-info-fg)}
.ac-ic.ac-warn{background:var(--su-warning-bg);color:var(--su-warning-fg)}
.ac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:var(--su-space-4);margin-top:var(--su-space-5)}
.ac-fbcard{display:flex;gap:var(--su-space-4);background:var(--su-surface-raised);border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-lg);padding:var(--su-space-4)}
.ac-vote{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;border:1px solid var(--su-border-default);border-radius:var(--su-radius-md);padding:var(--su-space-2) var(--su-space-3);min-width:52px;background:var(--su-surface-sunken)}
.ac-vote svg{width:16px;height:16px;color:var(--su-action)}
.ac-vote b{font-size:16px;font-weight:var(--su-fw-bold);color:var(--su-text-primary)}
.ac-vote span{font-size:11px;color:var(--su-text-muted)}
.ac-fbbody{flex:1;min-width:0}
.ac-fbhead{display:flex;align-items:center;justify-content:space-between;gap:var(--su-space-2);margin-bottom:var(--su-space-2)}
.ac-fbtitle{font-size:15px;font-weight:var(--su-fw-semibold);color:var(--su-text-primary)}
.ac-fbdesc{font-size:13px;color:var(--su-text-secondary);line-height:1.5;margin-bottom:var(--su-space-3)}
.ac-fbfoot{display:flex;align-items:center;justify-content:space-between;gap:var(--su-space-2);padding-top:var(--su-space-3);border-top:1px solid var(--su-border-subtle)}
.ac-author{display:flex;align-items:center;gap:var(--su-space-2);font-size:12px;color:var(--su-text-secondary);font-weight:var(--su-fw-medium)}
.ac-comments{display:flex;align-items:center;gap:var(--su-space-1);font-size:12px;color:var(--su-text-muted)}
.ac-comments svg{width:14px;height:14px}
.ac2-avatar-block{display:flex;align-items:center;gap:var(--su-space-5);padding:var(--su-space-5);background:var(--su-surface-raised);border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-lg);margin-bottom:var(--su-space-6)}
.ac2-avatar-lg{width:88px;height:88px;border-radius:var(--su-radius-full);background:var(--su-action-tint);color:var(--su-action);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:var(--su-fw-bold);flex-shrink:0;border:1px solid var(--su-border-subtle)}
.ac2-avatar-meta{display:flex;flex-direction:column;gap:var(--su-space-1)}
.ac2-avatar-name{font-size:18px;font-weight:var(--su-fw-semibold);color:var(--su-text-primary)}
.ac2-avatar-sub{font-size:13px;color:var(--su-text-muted)}
.ac2-avatar-actions{margin-top:var(--su-space-2);display:flex;gap:var(--su-space-2)}
.ac2-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--su-space-6);align-items:start}
.ac2-section-title{font-size:14px;font-weight:var(--su-fw-semibold);color:var(--su-text-primary);margin:0 0 var(--su-space-4)}
.ac2-form{display:flex;flex-direction:column;gap:var(--su-space-4)}
.ac2-label{font-size:13px;font-weight:var(--su-fw-medium);color:var(--su-text-secondary);min-width:140px}
.ac2-plan{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--su-space-4)}
.ac2-plan-name{display:flex;align-items:center;gap:var(--su-space-2);font-size:15px;font-weight:var(--su-fw-semibold);color:var(--su-text-primary);margin-bottom:var(--su-space-2)}
.ac2-price{font-size:26px;font-weight:var(--su-fw-bold);color:var(--su-text-primary);line-height:1}
.ac2-price small{font-size:13px;font-weight:var(--su-fw-medium);color:var(--su-text-muted)}
.ac2-plan-desc{font-size:13px;color:var(--su-text-secondary);margin-top:var(--su-space-2)}
.ac2-sessions{display:flex;flex-direction:column}
.ac2-session{display:flex;align-items:center;gap:var(--su-space-4);padding:var(--su-space-4) 0;border-top:1px solid var(--su-border-subtle)}
.ac2-session:first-child{border-top:none}
.ac2-session-ic{width:40px;height:40px;border-radius:var(--su-radius-md);background:var(--su-surface-sunken);color:var(--su-text-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--su-border-subtle)}
.ac2-session-body{flex:1;min-width:0}
.ac2-session-dev{font-size:14px;font-weight:var(--su-fw-medium);color:var(--su-text-primary);display:flex;align-items:center;gap:var(--su-space-2)}
.ac2-session-meta{font-size:12px;color:var(--su-text-muted);margin-top:2px}
.ac2-notif{display:flex;align-items:center;justify-content:space-between;gap:var(--su-space-4);padding:var(--su-space-4) 0;border-top:1px solid var(--su-border-subtle)}
.ac2-notif:first-child{border-top:none}
.ac2-notif-txt{font-size:14px;font-weight:var(--su-fw-medium);color:var(--su-text-primary)}
.ac2-notif-sub{font-size:12px;color:var(--su-text-muted);margin-top:2px}
.ac2-mb{margin-bottom:var(--su-space-6)}
.dc-grid-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--su-space-4);margin-bottom:var(--su-space-6);}
.dc-two{display:grid;grid-template-columns:1.15fr 1fr;gap:var(--su-space-4);align-items:start;}
.dc-funnel{display:flex;flex-direction:column;gap:var(--su-space-3);margin-top:var(--su-space-4);}
.dc-funnel__row{display:flex;flex-direction:column;gap:var(--su-space-2);}
.dc-funnel__head{display:flex;justify-content:space-between;align-items:baseline;}
.dc-funnel__stage{display:flex;align-items:center;gap:var(--su-space-2);font-size:13px;font-weight:var(--su-fw-semibold);color:var(--su-text-primary);}
.dc-funnel__ic{width:26px;height:26px;border-radius:var(--su-radius-sm);display:grid;place-items:center;background:var(--su-action-tint);color:var(--su-action);}
.dc-funnel__ic svg{width:15px;height:15px;}
.dc-funnel__val{font-size:14px;font-weight:var(--su-fw-bold);color:var(--su-text-primary);}
.dc-funnel__val small{font-size:12px;font-weight:var(--su-fw-medium);color:var(--su-text-muted);margin-left:6px;}
.dc-funnel__track{height:18px;border-radius:var(--su-radius-full);background:var(--su-surface-sunken);border:1px solid var(--su-border-subtle);overflow:hidden;}
.dc-funnel__fill{height:100%;border-radius:var(--su-radius-full);background:linear-gradient(90deg,var(--su-action),var(--su-action-hover));}
.dc-rank{display:flex;flex-direction:column;gap:var(--su-space-1);margin-top:var(--su-space-2);}
.dc-rank__row{display:grid;grid-template-columns:24px auto 1fr auto;align-items:center;gap:var(--su-space-3);padding:var(--su-space-3) var(--su-space-2);border-radius:var(--su-radius-md);}
.dc-rank__row:hover{background:var(--su-surface-sunken);}
.dc-rank__pos{font-size:13px;font-weight:var(--su-fw-bold);color:var(--su-text-muted);text-align:center;}
.dc-rank__id{display:flex;align-items:center;gap:var(--su-space-3);min-width:180px;}
.dc-rank__name{font-size:14px;font-weight:var(--su-fw-semibold);color:var(--su-text-primary);line-height:1.2;}
.dc-rank__sub{font-size:12px;color:var(--su-text-muted);}
.dc-rank__bar{height:8px;border-radius:var(--su-radius-full);background:var(--su-surface-sunken);overflow:hidden;}
.dc-rank__barfill{height:100%;border-radius:var(--su-radius-full);background:linear-gradient(90deg,var(--su-action),var(--su-action-hover));}
.dc-rank__val{font-size:14px;font-weight:var(--su-fw-bold);color:var(--su-text-primary);text-align:right;min-width:104px;}
.dc-board{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--su-space-4);margin-top:var(--su-space-5);align-items:start;}
.dc-col{background:var(--su-surface-sunken);border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-lg);padding:var(--su-space-3);display:flex;flex-direction:column;gap:var(--su-space-3);}
.dc-col__head{display:flex;align-items:center;justify-content:space-between;padding:var(--su-space-1) var(--su-space-2);}
.dc-col__title{font-size:14px;font-weight:var(--su-fw-bold);color:var(--su-text-primary);}
.dc-col__count{font-size:12px;font-weight:var(--su-fw-semibold);color:var(--su-text-muted);background:var(--su-surface-raised);border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-full);padding:2px 9px;}
.dc-card{background:var(--su-surface-raised);border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-md);padding:var(--su-space-4);box-shadow:var(--su-elevation-raised);display:flex;flex-direction:column;gap:var(--su-space-2);}
.dc-card__top{display:flex;align-items:center;justify-content:space-between;gap:var(--su-space-2);}
.dc-card__title{font-size:14px;font-weight:var(--su-fw-semibold);color:var(--su-text-primary);line-height:1.25;}
.dc-card__desc{font-size:13px;color:var(--su-text-secondary);line-height:1.45;}
.dc-card__foot{display:flex;align-items:center;justify-content:space-between;margin-top:var(--su-space-1);padding-top:var(--su-space-2);border-top:1px solid var(--su-border-subtle);}
.dc-card__meta{font-size:12px;color:var(--su-text-muted);display:flex;align-items:center;gap:6px;}
.dc-card__meta svg{width:14px;height:14px;}
.dc-tag{font-size:11px;font-weight:var(--su-fw-semibold);color:var(--su-text-secondary);background:var(--su-surface-sunken);border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-full);padding:2px 8px;}
/* ===== screenCompplus (cp-) ===== */
.cp-block{display:flex;flex-direction:column;gap:var(--su-space-3);}
.cp-lbl{font-size:12px;font-weight:var(--su-fw-semibold);color:var(--su-text-muted);text-transform:uppercase;letter-spacing:.04em;}

/* botão loading + spinner */
.cp-spin{width:15px;height:15px;border-radius:var(--su-radius-full);border:2px solid var(--su-border-strong);border-top-color:var(--su-action);display:inline-block;animation:cp-rot .7s linear infinite;}
.cp-spin--onact{border-color:rgba(255,255,255,.4);border-top-color:var(--su-text-on-action);}
@keyframes cp-rot{to{transform:rotate(360deg);}}
.su-btn.cp-loading{pointer-events:none;opacity:.9;}

/* tooltip */
.cp-tipwrap{position:relative;display:inline-flex;}
.cp-tip{position:relative;background:var(--su-surface-sunken);color:var(--su-text-primary);border:1px solid var(--su-border-default);border-radius:var(--su-radius-md);padding:var(--su-space-2) var(--su-space-3);font-size:12px;font-weight:var(--su-fw-medium);box-shadow:var(--su-elevation-raised);max-width:220px;}
.cp-tip::after{content:"";position:absolute;left:22px;bottom:-6px;width:10px;height:10px;background:var(--su-surface-sunken);border-right:1px solid var(--su-border-default);border-bottom:1px solid var(--su-border-default);transform:rotate(45deg);}

/* breadcrumb */
.cp-crumb{display:flex;align-items:center;gap:var(--su-space-2);flex-wrap:wrap;font-size:13px;}
.cp-crumb a{color:var(--su-text-secondary);text-decoration:none;padding:2px var(--su-space-2);border-radius:var(--su-radius-sm);}
.cp-crumb a:hover{background:var(--su-action-tint);color:var(--su-action);}
.cp-crumb .cp-cur{color:var(--su-text-primary);font-weight:var(--su-fw-semibold);}
.cp-crumb .cp-sep{color:var(--su-text-muted);display:inline-flex;}

/* date-range */
.cp-drow{display:flex;align-items:center;gap:var(--su-space-2);}
.cp-dfield{flex:1;display:flex;align-items:center;gap:var(--su-space-2);background:var(--su-surface-sunken);border:1px solid var(--su-border-default);border-radius:var(--su-radius-md);padding:var(--su-space-2) var(--su-space-3);font-size:13px;color:var(--su-text-primary);}
.cp-dfield svg{color:var(--su-text-muted);width:15px;height:15px;flex:none;}
.cp-darrow{color:var(--su-text-muted);}
.cp-cal{margin-top:var(--su-space-3);background:var(--su-surface-sunken);border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-md);padding:var(--su-space-3);}
.cp-cal__hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--su-space-2);font-size:13px;font-weight:var(--su-fw-semibold);color:var(--su-text-primary);}
.cp-cal__grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cp-cal__grid span{text-align:center;font-size:11px;color:var(--su-text-muted);padding:var(--su-space-1) 0;}
.cp-cal__grid b{text-align:center;font-size:12px;font-weight:var(--su-fw-medium);color:var(--su-text-secondary);padding:var(--su-space-1) 0;border-radius:var(--su-radius-sm);}
.cp-cal__grid b.cp-in{background:var(--su-action-tint);color:var(--su-action);}
.cp-cal__grid b.cp-edge{background:var(--su-action);color:var(--su-text-on-action);font-weight:var(--su-fw-semibold);}
.cp-cal__grid b.cp-mut{color:var(--su-text-muted);opacity:.5;}

/* combobox multi */
.cp-combo{background:var(--su-surface-sunken);border:1px solid var(--su-border-default);border-radius:var(--su-radius-md);padding:var(--su-space-2);display:flex;flex-wrap:wrap;gap:var(--su-space-2);align-items:center;}
.cp-chip{display:inline-flex;align-items:center;gap:var(--su-space-2);background:var(--su-action-tint);color:var(--su-action);border-radius:var(--su-radius-full);padding:3px var(--su-space-2) 3px var(--su-space-3);font-size:12px;font-weight:var(--su-fw-medium);}
.cp-chip button{background:none;border:none;cursor:pointer;color:var(--su-action);display:inline-flex;padding:0;opacity:.8;}
.cp-chip button:hover{opacity:1;}
.cp-chip svg{width:12px;height:12px;}
.cp-combo input{flex:1;min-width:60px;background:none;border:none;outline:none;font-size:13px;color:var(--su-text-primary);padding:var(--su-space-1);}
.cp-menu{margin-top:2px;border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-md);background:var(--su-surface-raised);overflow:hidden;}
.cp-menu button{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:var(--su-space-2) var(--su-space-3);font-size:13px;color:var(--su-text-secondary);display:flex;justify-content:space-between;align-items:center;}
.cp-menu button:hover{background:var(--su-action-tint);color:var(--su-action);}

/* dropzone */
.cp-drop{border:1.5px dashed var(--su-border-strong);border-radius:var(--su-radius-lg);background:var(--su-surface-sunken);padding:var(--su-space-6);display:flex;flex-direction:column;align-items:center;gap:var(--su-space-2);text-align:center;}
.cp-drop__ic{width:40px;height:40px;border-radius:var(--su-radius-full);background:var(--su-action-tint);color:var(--su-action);display:flex;align-items:center;justify-content:center;}
.cp-drop__ic svg{width:20px;height:20px;}
.cp-drop b{font-size:13px;color:var(--su-text-primary);font-weight:var(--su-fw-semibold);}
.cp-drop small{font-size:12px;color:var(--su-text-muted);}
.cp-file{display:flex;align-items:center;gap:var(--su-space-3);margin-top:var(--su-space-3);background:var(--su-surface-sunken);border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-md);padding:var(--su-space-2) var(--su-space-3);}
.cp-file svg{width:16px;height:16px;color:var(--su-text-muted);flex:none;}
.cp-file .cp-fn{font-size:13px;color:var(--su-text-primary);font-weight:var(--su-fw-medium);flex:1;}
.cp-file small{font-size:12px;color:var(--su-text-muted);}

/* barra de filtros */
.cp-filters{display:flex;flex-wrap:wrap;gap:var(--su-space-2);align-items:center;}
.cp-fchip{display:inline-flex;align-items:center;gap:var(--su-space-2);background:var(--su-surface-sunken);border:1px solid var(--su-border-default);border-radius:var(--su-radius-full);padding:var(--su-space-2) var(--su-space-3);font-size:12px;font-weight:var(--su-fw-medium);color:var(--su-text-secondary);}
.cp-fchip.cp-on{background:var(--su-action-tint);border-color:var(--su-action);color:var(--su-action);}
.cp-fchip svg{width:13px;height:13px;}
.cp-fchip button{background:none;border:none;cursor:pointer;color:inherit;display:inline-flex;padding:0;}
.cp-fclear{background:none;border:none;cursor:pointer;font-size:12px;color:var(--su-text-muted);font-weight:var(--su-fw-medium);text-decoration:underline;}

/* densidade */
.cp-dens{display:inline-flex;background:var(--su-surface-sunken);border:1px solid var(--su-border-default);border-radius:var(--su-radius-md);padding:3px;gap:2px;}
.cp-dens button{background:none;border:none;cursor:pointer;padding:var(--su-space-2) var(--su-space-3);border-radius:var(--su-radius-sm);font-size:12px;font-weight:var(--su-fw-medium);color:var(--su-text-secondary);display:inline-flex;align-items:center;gap:var(--su-space-2);}
.cp-dens button svg{width:14px;height:14px;}
.cp-dens button.cp-on{background:var(--su-surface-raised);color:var(--su-text-primary);box-shadow:var(--su-elevation-raised);}

/* modal preview */
.cp-scrim{position:relative;border-radius:var(--su-radius-md);overflow:hidden;background:var(--su-surface-sunken);min-height:210px;display:flex;align-items:center;justify-content:center;padding:var(--su-space-4);}
.cp-scrim::before{content:"";position:absolute;inset:0;background:var(--su-text-primary);opacity:.28;}
.cp-modal{position:relative;width:100%;max-width:300px;background:var(--su-surface-raised);border:1px solid var(--su-border-subtle);border-radius:var(--su-radius-lg);box-shadow:var(--su-elevation-raised);overflow:hidden;}
.cp-modal__hd{display:flex;align-items:center;justify-content:space-between;padding:var(--su-space-4);border-bottom:1px solid var(--su-border-subtle);}
.cp-modal__hd h5{margin:0;font-size:15px;font-weight:var(--su-fw-semibold);color:var(--su-text-primary);}
.cp-modal__bd{padding:var(--su-space-4);font-size:13px;color:var(--su-text-secondary);line-height:1.5;}
.cp-modal__ft{display:flex;justify-content:flex-end;gap:var(--su-space-2);padding:var(--su-space-3) var(--su-space-4);background:var(--su-surface-sunken);border-top:1px solid var(--su-border-subtle);}

/* toast */
.cp-toast{display:flex;align-items:flex-start;gap:var(--su-space-3);background:var(--su-surface-raised);border:1px solid var(--su-border-subtle);border-left-width:3px;border-radius:var(--su-radius-md);padding:var(--su-space-3) var(--su-space-4);box-shadow:var(--su-elevation-raised);}
.cp-toast+.cp-toast{margin-top:var(--su-space-3);}
.cp-toast__ic{width:22px;height:22px;border-radius:var(--su-radius-full);display:flex;align-items:center;justify-content:center;flex:none;margin-top:1px;}
.cp-toast__ic svg{width:14px;height:14px;}
.cp-toast--ok{border-left-color:var(--su-success-fg);}
.cp-toast--ok .cp-toast__ic{background:var(--su-success-bg);color:var(--su-success-fg);}
.cp-toast--err{border-left-color:var(--su-danger-fg);}

  ];
  const smalls = [

  // ---- Funil comercial (mesmos estagios do real) ----
  const funnel = [

  </div>

  <div class="dc-kpis">
    ${smalls.map(s=>`<div class="card"><div class="card__pad dc-sstat"><div class="dc-sstat__top"><span class="dc-sstat__ic" style="background:${s[4]};color:${s[3]}">${s[2]}</span><span class="dc-sstat__label">${s[0]}</span></div><div class="dc-sstat__val">${s[1]}</div></div></div>`).join('')}
  </div>

  <div class="dc-two">
    <div class="card"><div class="card__pad">
      <div class="row-between"><div><div class="card__title">Funil comercial</div><div class="card__desc">Por estágio do pipeline — Julho/2026</div></div><span class="su-badge brand">31,8% conv.</span></div>

      <p class="dc-note">Conversão do período: <strong>31,8%</strong> · Tempo médio até vender: <strong>18 dias</strong></p>
    </div></div>

    <div class="card"><div class="card__pad">
      <div class="card__title">Motivos de perda</div><div class="card__desc">Oportunidades não convertidas — Julho/2026</div>
      <ul class="dc-loss">${loss.map(l=>`<li><span class="dc-loss__l"><span class="dc-dot" style="background:${l[2]}"></span>${l[0]}</span><span class="dc-loss__bar"><span class="dc-loss__fill" style="width:${(l[1]/lmax*100).toFixed(0)}%;background:${l[2]}"></span></span><span class="dc-loss__v">${l[1]}</span></li>`).join('')}</ul>
      <div class="dc-tempttl">Por temperatura</div>

        <div><div class="dc-temp__v" style="color:#3b82f6">1.120</div><div class="dc-temp__l">Frio</div></div>
      </div>
    </div></div>
  </div>

  <div class="dc-three">
    <div class="card"><div class="card__pad"><div class="card__title">Status dos pedidos</div><div class="card__desc" style="margin-bottom:var(--su-space-2)">Distribuição por situação</div>${donut(pieSales,'1.014','pedidos')}</div></div>
    <div class="card"><div class="card__pad"><div class="card__title">Leads por status</div><div class="card__desc" style="margin-bottom:var(--su-space-2)">Origem e-mail / CRM</div>${donut(pieLeads,'3.190','leads')}</div></div>

function render(scr,title,preset,grp){const c=document.getElementById('content');c.innerHTML=SCREENS[scr]?SCREENS[scr](title):screenList(title,preset);document.getElementById('crumb').textContent=title;const cg=document.getElementById('crumbgrp');if(cg)cg.innerHTML=grp?`${grp} <span class="crumb-sep">›</span> `:'';document.querySelector('.main').scrollTo(0,0);}

// ===== nav =====
const nav=document.getElementById('nav');let firstLeaf=null;const LEAVES=[];
MENU.forEach(m=>{if(m.divider){const d=document.createElement('div');d.className='nav__sec';d.textContent=m.divider;nav.appendChild(d);return;}if(m.children){
  const btn=document.createElement('button');btn.className='nav__item';btn.innerHTML=ic(m.icon)+`<span class="lbl">${m.label}</span><svg class="nav__chev ${m.open?'open':''}" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;
  const box=document.createElement('div');box.className='nav__children'+(m.open?' open':'');
  m.children.forEach(ch=>{const b=document.createElement('button');b.className='nav__item';b.innerHTML=`<span class="lbl">${ch.label}</span>`;b.onclick=()=>select(b,ch);box.appendChild(b);LEAVES.push({label:ch.label,icon:m.icon,grp:m.label,btn:b,item:ch});if(!firstLeaf)firstLeaf={b,ch};});
  btn.onclick=()=>{const willOpen=!box.classList.contains('open');document.querySelectorAll('.nav__children.open').forEach(o=>{if(o!==box){o.classList.remove('open');const gv=o.previousElementSibling&&o.previousElementSibling.querySelector('.nav__chev');if(gv)gv.classList.remove('open');}});box.classList.toggle('open',willOpen);btn.querySelector('.nav__chev').classList.toggle('open',willOpen);};nav.appendChild(btn);nav.appendChild(box);
 }else{const b=document.createElement('button');b.className='nav__item';b.innerHTML=ic(m.icon)+`<span class="lbl">${m.label}</span>`;b.onclick=()=>select(b,m);nav.appendChild(b);LEAVES.push({label:m.label,icon:m.icon,grp:'',btn:b,item:m});if(!firstLeaf)firstLeaf={b,ch:m};}});
function select(el,item){document.querySelectorAll('.nav__item').forEach(n=>n.classList.remove('active'));el.classList.add('active');const leaf=LEAVES.find(x=>x.btn===el);render(item.screen,item.label,item.preset,leaf?leaf.grp:'');}
if(firstLeaf)select(firstLeaf.b,firstLeaf.ch);

// ===== command palette =====
const pal=document.getElementById('cmdk'),palIn=document.getElementById('cmdk-in'),palList=document.getElementById('cmdk-list');let palF=[],palIdx=0;
function palRender(q){q=(q||'').toLowerCase();palF=LEAVES.filter(l=>l.label.toLowerCase().includes(q)||(l.grp||'').toLowerCase().includes(q));palIdx=0;
 palList.innerHTML=palF.length?palF.map((l,i)=>`<div class="cmdk__item${i===0?' active':''}" data-i="${i}">${ic(l.icon)}<span>${l.label}</span>${l.grp?`<span class="cmdk__grp">${l.grp}</span>`:''}</div>`).join(''):'<div class="cmdk__empty">Nada encontrado</div>';}
function palOpen(){pal.style.display='flex';palIn.value='';palRender('');palIn.focus();}function palClose(){pal.style.display='none';}
function palHi(){[...palList.querySelectorAll('.cmdk__item')].forEach((c,i)=>{c.classList.toggle('active',i===palIdx);if(i===palIdx)c.scrollIntoView({block:'nearest'});});}
function palGo(i){const l=palF[i];if(!l)return;const box=l.btn.closest('.nav__children');if(box&&!box.classList.contains('open')){box.classList.add('open');const gv=box.previousElementSibling&&box.previousElementSibling.querySelector('.nav__chev');if(gv)gv.classList.add('open');}select(l.btn,l.item);palClose();}
palIn.addEventListener('input',e=>palRender(e.target.value));
palIn.addEventListener('keydown',e=>{if(e.key==='ArrowDown'){e.preventDefault();palIdx=Math.min(palIdx+1,palF.length-1);palHi();}else if(e.key==='ArrowUp'){e.preventDefault();palIdx=Math.max(palIdx-1,0);palHi();}else if(e.key==='Enter'){e.preventDefault();palGo(palIdx);}else if(e.key==='Escape'){palClose();}});
palList.addEventListener('click',e=>{const it=e.target.closest('.cmdk__item');if(it)palGo(+it.dataset.i);});
pal.addEventListener('click',e=>{if(e.target===pal)palClose();});
document.querySelector('.search').addEventListener('click',palOpen);
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();pal.style.display==='flex'?palClose():palOpen();}});
