<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Studio UX — Exemplo Mobile: Entrar</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../packages/tokens/tokens.css">
  <link rel="stylesheet" href="../packages/mobile/mobile.css">
  <style>
    body { margin: 0; background: var(--su-surface-sunken); font-family: var(--su-font-ui); color: var(--su-text-primary); }
    .phone { max-width: 390px; margin: 0 auto; min-height: 100vh; background: var(--su-surface-base); display: flex; flex-direction: column; position: relative; }
    .app { flex: 1; display: flex; flex-direction: column; padding: 0 var(--su-space-5); }
    /* Bloco de marca no topo (mobile é tela própria, não desktop encolhido — P4) */
    .brand { padding: var(--su-space-10) 0 var(--su-space-6); }
    .brandmark { display: inline-flex; align-items: center; gap: 10px; font-weight: var(--su-fw-semibold); font-size: 17px; }
    /* SLOT DE MARCA — troque por <img class="su-brand__logo" src="logo-do-cliente"> */
    .su-brand__logo { width: 32px; height: 32px; border-radius: 9px; background: var(--su-action); color: #fff; display: inline-flex; align-items: center; justify-content: center; object-fit: contain; }
    .brand h1 { font-size: 24px; font-weight: var(--su-fw-semibold); margin: var(--su-space-5) 0 4px; }
    .brand p { color: var(--su-text-secondary); font-size: 14px; margin: 0; }
    .form { display: flex; flex-direction: column; gap: var(--su-space-4); }
    .field-label { font-size: 13px; font-weight: var(--su-fw-medium); color: var(--su-text-secondary); margin-bottom: 6px; display: block; }
    .inputwrap { position: relative; display: flex; align-items: center; }
    .inputwrap > .ti { position: absolute; left: 14px; color: var(--su-text-muted); font-size: 20px; pointer-events: none; }
    .inputwrap .su-m-input { padding-left: 44px; }
    .link { color: var(--su-action); text-decoration: none; font-weight: var(--su-fw-medium); font-size: 13px; }
    .forgot { display: block; text-align: right; margin-top: 7px; font-size: 12px; color: var(--su-text-muted); text-decoration: none; }
    .forgot:hover { color: var(--su-action); }
    .divider-or { display: flex; align-items: center; gap: 12px; color: var(--su-text-muted); font-size: 12px; margin: var(--su-space-3) 0 var(--su-space-1); }
    .divider-or::before, .divider-or::after { content: ""; flex: 1; height: 1px; background: var(--su-border-subtle); }
    .sso { display: flex; flex-direction: column; gap: var(--su-space-2); }
    .signup { text-align: center; font-size: 13px; color: var(--su-text-secondary); padding: var(--su-space-6) 0; margin-top: auto; }
    .toggle { position: absolute; top: 14px; right: 14px; background: none; border: 0; color: var(--su-text-muted); font-size: 22px; }
  </style>
</head>
<body>
  <div class="phone su-m">
    <button class="toggle" aria-label="Alternar tema" onclick="var h=document.documentElement;h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';"><i class="ti ti-moon"></i></button>
    <div class="app">
      <div class="brand">
        <div class="brandmark"><span class="su-brand__logo"><i class="ti ti-square-rounded"></i></span>Studio UX</div>
        <h1>Bem-vindo de volta.</h1>
        <p>Entre para continuar de onde parou.</p>
      </div>

      <form class="form" onsubmit="return false;">
        <div>
          <label class="field-label" for="email">E-mail</label>
          <div class="inputwrap"><i class="ti ti-mail"></i><input class="su-m-input" id="email" type="email" inputmode="email" placeholder="voce@empresa.com" autocomplete="username"></div>
        </div>
        <div>
          <label class="field-label" for="senha">Senha</label>
          <div class="inputwrap"><i class="ti ti-lock"></i><input class="su-m-input" id="senha" type="password" placeholder="••••••••" autocomplete="current-password"></div>
          <a class="forgot" href="#">Esqueci a senha?</a>
        </div>

        <button class="su-m-cta" style="margin-top:var(--su-space-2);">Entrar</button>

        <div class="divider-or">ou continue com</div>
        <div class="sso">
          <button class="su-m-cta su-m-cta--ghost"><i class="ti ti-brand-google"></i>Continuar com Google</button>
          <button class="su-m-cta su-m-cta--ghost"><i class="ti ti-brand-windows"></i>Continuar com Microsoft</button>
        </div>
      </form>

      <div class="signup">Não tem conta? <a class="link" href="#">Falar com o administrador</a></div>
    </div>
  </div>
</body>
</html>
